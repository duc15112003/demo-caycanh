services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: caycanhdb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Only runs on the first start when the data volume is still empty.
      - ./caycanh.sql:/docker-entrypoint-initdb.d/01-caycanh.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d caycanhdb"]
      interval: 5s
      timeout: 5s
      retries: 10
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGPASS_FILE: /pgpass/pgpass.conf
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json:ro
      - ./pgpass.conf:/pgpass/pgpass.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caycanh-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caycanhdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: caycanh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      REACT_APP_API_BASE_URL: http://160.250.181.24/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

  dozzle:
    image: amir20/dozzle:latest
    container_name: caycanh-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"

volumes:
  postgres_data:
  pgadmin_data:
